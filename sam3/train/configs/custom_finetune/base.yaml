# @package _global_
defaults:
  - _self_

# ============================================================================
# Paths — Edit these 4 fields to run on your dataset (all others have defaults)
# ============================================================================
paths:
  dataset_img_folder: /home/longtdang/KMS/sam3/00_raw/images  # REQUIRED: absolute path to directory containing your images (train + val share the same dir when using prepare_dataset.py)
  train_ann_file: /home/longtdang/KMS/sam3/00_raw/coco/train.json  # REQUIRED: absolute path to train.json produced by scripts/prepare_dataset.py
  val_ann_file: /home/longtdang/KMS/sam3/00_raw/coco/val.json      # REQUIRED: absolute path to val.json produced by scripts/prepare_dataset.py
  experiment_log_dir: /home/longtdang/KMS/sam3/experiments  # REQUIRED: absolute path for checkpoints, TensorBoard logs, and eval dumps
  bpe_path: /home/longtdang/KMS/sam3/sam3/assets/bpe_simple_vocab_16e6.txt.gz  # Optional: null = use bundled vocab at sam3/assets/bpe_simple_vocab_16e6.txt.gz (recommended)

# ============================================================================
# Scratch — Shared interpolation variables (edit values here; ${scratch.*} used below)
# ============================================================================
scratch:
  # --- Segmentation toggle (CRITICAL: SAM3 defaults to detection-only; this enables mask training) ---
  enable_segmentation: true  # CFG-05: drives 5 downstream fields via ${scratch.enable_segmentation} interpolation

  # --- Model internals (do not change) ---
  d_model: 256  # transformer hidden dimension
  pos_embed:
    _target_: sam3.model.position_encoding.PositionEmbeddingSine
    num_pos_feats: ${scratch.d_model}  # must equal d_model
    normalize: true
    scale: null
    temperature: 10000

  # --- Matcher (Hungarian assignment for find queries) ---
  matcher:
    _target_: sam3.train.matcher.BinaryHungarianMatcherV2
    focal: true       # focal cost weighting during bipartite assignment
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2
    stable: False
  scale_by_find_batch_size: True  # normalize loss by effective batch size (recommended with grad accum)

  # --- Image processing ---
  resolution: 1008               # model input resolution in pixels (fixed — do not change)
  consistent_transform: False    # training: per-image random crop; set True only for video
  max_ann_per_img: 200           # drop images with more annotations (memory guard)

  # --- Normalization (CFG-06: SAM3 pre-training values — NOT ImageNet [0.485, 0.456, 0.406]) ---
  train_norm_mean: [0.5, 0.5, 0.5]  # SAM3 standard; changing breaks pretrained weight compatibility
  train_norm_std: [0.5, 0.5, 0.5]
  val_norm_mean: [0.5, 0.5, 0.5]
  val_norm_std: [0.5, 0.5, 0.5]

  # --- Training schedule (D-12: small-dataset defaults for < 500 images) ---
  max_data_epochs: 40     # controls trainer.max_epochs via interpolation
  target_epoch_size: 500  # documentation-only — not consumed by Trainer code
  num_train_workers: 2    # L4: reduced from 4 to lower CPU↔GPU memory pressure
  num_val_workers: 0      # 0 = no multiprocessing for eval (avoids eval deadlocks)
  hybrid_repeats: 1       # dataset repeat factor within one epoch (1 = no repeat)
  context_length: 2       # text query token count (do not change)
  gather_pred_via_filesys: false  # True only for large multi-node distributed eval

  # --- Learning rates (decoder-only fine-tune for L4) ---
  # Vision backbone set to 0.0 to truly freeze it (no gradient computation).
  # This is the single biggest memory saving on L4 — ViT is ~300M params.
  lr_scale: 0.03
  lr_transformer: 8e-5
  lr_vision_backbone: 0.0       # L4: unused — backbone frozen via freeze_vision_backbone=true
  lr_language_backbone: 0.0     # L4: unused — backbone frozen via freeze_language_backbone=true
  lrd_vision_backbone: 0.9  # layer-wise LR decay exponent across ViT trunk layers
  wd: 0.1                  # AdamW weight decay
  scheduler_timescale: 20  # inverse square root warmup timescale
  scheduler_warmup: 20     # warmup steps
  scheduler_cooldown: 20   # cooldown steps at training end

  # --- Batch and accumulation ---
  # gradient_accumulation_steps: 1 fixes the "Expected a list of batches, got dict" crash.
  # With train_batch_size=1, effective batch = 1. Use gradient_accumulation_steps=1 on L4.
  val_batch_size: 1
  train_batch_size: 1
  gradient_accumulation_steps: 1  # L4: set to 1 to fix crash and reduce memory (was 4)

  # --- Presence head ---
  use_presence_eval: True  # use presence head during evaluation (SAM3 standard setting)

  # --- Segmentation eval postprocessor (iou_type: segm required for mask AP metrics) ---
  segm_postprocessor:
    _target_: sam3.eval.postprocessors.PostProcessImage
    max_dets_per_img: -1          # no cap on detections during eval
    iou_type: "segm"              # enables pred_masks output path in postprocessor
    use_original_ids: true        # preserve original COCO category IDs
    use_original_sizes_box: true  # rescale boxes to original image resolution
    use_original_sizes_mask: true # rescale masks to original image resolution
    convert_mask_to_rle: True     # COCO eval API requires RLE-encoded masks
    use_presence: ${scratch.use_presence_eval}

  # --- Collators (with_seg_masks interpolates enable_segmentation → masks flow to loss + eval) ---
  collate_fn:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: custom              # must match trainer.meters.val key and trainer.loss key
    with_seg_masks: ${scratch.enable_segmentation}  # CFG-05: passes mask tensors to Sam3LossWrapper

  collate_fn_val:
    _target_: sam3.train.data.collator.collate_fn_api
    _partial_: true
    repeats: ${scratch.hybrid_repeats}
    dict_key: custom              # must match trainer.meters.val key
    with_seg_masks: ${scratch.enable_segmentation}  # CFG-05: passes mask tensors to PredictionDumper

  # --- Train transforms pipeline ---
  train_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterCrowds  # remove iscrowd annotations
        - _target_: sam3.train.transforms.point_sampling.RandomizeInputBbox
          box_noise_std: 0.1   # jitter input boxes for robustness
          box_noise_max: 20
        - _target_: sam3.train.transforms.segmentation.DecodeRle  # decode RLE masks from COCO JSON
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes:
            _target_: sam3.train.transforms.basic.get_random_resize_scales
            size: ${scratch.resolution}
            min_size: 480
            rounded: false
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: ${scratch.consistent_transform}
        - _target_: sam3.train.transforms.basic_for_api.PadToSizeAPI
          size: ${scratch.resolution}  # pad to 1008×1008 square
          consistent_transform: ${scratch.consistent_transform}
        - _target_: sam3.train.transforms.basic.ColorJitter  # D-03-04: PIL stage augmentation
          brightness: 0.2
          contrast: 0.2
          saturation: 0.2
          hue: 0.0
        - _target_: sam3.train.transforms.basic.GaussianBlur  # D-03-04: PIL stage augmentation
          kernel_size: 3
          sigma: [0.1, 2.0]
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.basic.RandomErasingAPI  # D-03-04: tensor stage augmentation
          p: 0.2
          scale: [0.02, 0.1]
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets  # drop images with no valid boxes post-resize
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.train_norm_mean}  # CFG-06: [0.5, 0.5, 0.5]
          std: ${scratch.train_norm_std}
        - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
          query_filter:
            _target_: sam3.train.transforms.filter_query_transforms.FilterEmptyTargets
    - _target_: sam3.train.transforms.filter_query_transforms.FlexibleFilterFindGetQueries
      query_filter:
        _target_: sam3.train.transforms.filter_query_transforms.FilterFindQueriesWithTooManyOut
        max_num_objects: ${scratch.max_ann_per_img}

  # --- Val transforms pipeline (deterministic resize + normalize, no augmentation) ---
  val_transforms:
    - _target_: sam3.train.transforms.basic_for_api.ComposeAPI
      transforms:
        - _target_: sam3.train.transforms.basic_for_api.RandomResizeAPI
          sizes: ${scratch.resolution}  # deterministic single-scale resize
          max_size:
            _target_: sam3.train.transforms.basic.get_random_resize_max_size
            size: ${scratch.resolution}
          square: true
          consistent_transform: False
        - _target_: sam3.train.transforms.basic_for_api.ToTensorAPI
        - _target_: sam3.train.transforms.basic_for_api.NormalizeAPI
          mean: ${scratch.val_norm_mean}  # CFG-06: [0.5, 0.5, 0.5]
          std: ${scratch.val_norm_std}

  # --- Loss (segmentation-enabled — Masks entry is uncommented vs. roboflow reference config) ---
  loss:
    _target_: sam3.train.loss.sam3_loss.Sam3LossWrapper
    matcher: ${scratch.matcher}
    o2m_weight: 2.0  # weight for one-to-many auxiliary matching loss
    o2m_matcher:
      _target_: sam3.train.matcher.BinaryOneToManyMatcher
      alpha: 0.3
      threshold: 0.4
      topk: 4
    use_o2m_matcher_on_o2m_aux: false
    loss_fns_find:
      - _target_: sam3.train.loss.loss_fns.Boxes  # bounding box L1 + GIoU loss
        weight_dict:
          loss_bbox: 5.0
          loss_giou: 2.0
      - _target_: sam3.train.loss.loss_fns.IABCEMdetr  # classification + presence focal loss
        weak_loss: False
        weight_dict:
          loss_ce: 20.0
          presence_loss: 20.0
        pos_weight: 10.0
        alpha: 0.25
        gamma: 2
        use_presence: True
        pos_focal: false
        pad_n_queries: 200
        pad_scale_pos: 1.0
      - _target_: sam3.train.loss.loss_fns.Masks  # mask supervision (UNCOMMENTED — required for segmentation training)
        focal_alpha: 0.25
        focal_gamma: 2.0
        weight_dict:
          loss_mask: 200.0  # high weight: mask quality is the primary objective
          loss_dice: 10.0
        compute_aux: false
    loss_fn_semantic_seg: null  # optional semantic-seg head; null = disabled for image-only fine-tune
    scale_by_find_batch_size: ${scratch.scale_by_find_batch_size}

# ============================================================================
# Trainer
# ============================================================================
trainer:
  _target_: sam3.train.trainer.Trainer
  skip_saving_ckpts: false          # enable checkpoint saving (roboflow ref had true = eval-only mode)
  empty_gpu_mem_cache_after_eval: True  # free GPU cache after each eval run
  skip_first_val: True              # skip eval before first training step (saves time on epoch 0)
  max_epochs: ${scratch.max_data_epochs}  # D-12: 40 epochs for small datasets
  accelerator: cuda
  seed_value: 42                    # reproducibility seed
  val_epoch_freq: 1                 # D-03-06: evaluate every epoch (40-epoch fine-tuning runs)
  mode: train
  gradient_accumulation_steps: ${scratch.gradient_accumulation_steps}  # D-12: 4

  distributed:
    backend: nccl
    find_unused_parameters: True    # required: SAM3 has conditional graph branches
    gradient_as_bucket_view: True   # memory optimization for DDP gradient buckets
    static_graph: True

  loss:
    custom: ${scratch.loss}         # "custom" key must match collate_fn.dict_key
    default:
      _target_: sam3.train.loss.sam3_loss.DummyLoss  # no-op loss for any other dict_keys

  data:
    train:
      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset
        img_folder: ${paths.dataset_img_folder}       # D-05: resolves from REQUIRED paths field
        ann_file: ${paths.train_ann_file}              # D-05: resolves from REQUIRED paths field
        load_segmentation: ${scratch.enable_segmentation}  # CFG-05: loads RLE masks from COCO JSON
        transforms: ${scratch.train_transforms}
        max_ann_per_img: 500000   # generous cap; runtime filter (FilterFindQueriesWithTooManyOut) handles actual limit
        multiplier: 1
        max_train_queries: 50000
        max_val_queries: 50000
        training: true
        use_caching: False        # disable in-memory cache; enable if dataset fits in RAM

      shuffle: True
      batch_size: ${scratch.train_batch_size}    # D-12: 1
      num_workers: ${scratch.num_train_workers}
      pin_memory: True
      drop_last: True             # drop incomplete final batch (required with gradient accumulation)
      collate_fn: ${scratch.collate_fn}

    val:
      _target_: sam3.train.data.torch_dataset.TorchDataset
      dataset:
        _target_: sam3.train.data.sam3_image_dataset.Sam3ImageDataset
        img_folder: ${paths.dataset_img_folder}       # D-05: same image dir as train (prepare_dataset.py structure)
        ann_file: ${paths.val_ann_file}                # D-05: resolves from REQUIRED paths field
        load_segmentation: ${scratch.enable_segmentation}  # CFG-05: loads GT masks for eval
        coco_json_loader:
          _target_: sam3.train.data.coco_json_loaders.COCO_FROM_JSON
          include_negatives: true          # include images with 0 annotations in eval set
          category_chunk_size: 1           # L4: reduced from 2 to lower GPU OOM risk during eval
          _partial_: true
        transforms: ${scratch.val_transforms}
        max_ann_per_img: 100000
        multiplier: 1
        training: false

      shuffle: False
      batch_size: ${scratch.val_batch_size}
      num_workers: ${scratch.num_val_workers}
      pin_memory: True
      drop_last: False
      collate_fn: ${scratch.collate_fn_val}

  model:
    _target_: sam3.model_builder.build_sam3_image_model
    bpe_path: ${paths.bpe_path}    # null = use bundled sam3/assets/bpe_simple_vocab_16e6.txt.gz
    device: cuda
    eval_mode: false
    enable_segmentation: ${scratch.enable_segmentation}  # CFG-05: activates mask decoding head in model
    checkpoint_path: /home/longtdang/KMS/sam3/models/sam3_origin/sam3.pt
    load_from_HF: false
    freeze_vision_backbone: true    # L4: truly freeze ViT — prevents grad through inference-only fused ops
    freeze_language_backbone: true  # L4: truly freeze language backbone

  meters:
    val:
      custom:  # must match collate_fn_val.dict_key = "custom"
        detection:
          _target_: sam3.eval.coco_writer.PredictionDumper
          iou_type: "segm"              # reports segmentation AP (not bbox AP)
          dump_dir: ${launcher.experiment_log_dir}/dumps/custom
          merge_predictions: True       # merge predictions from all DDP workers
          postprocessor: ${scratch.segm_postprocessor}
          gather_pred_via_filesys: ${scratch.gather_pred_via_filesys}
          maxdets: 100
          pred_file_evaluators:
            - _target_: sam3.eval.coco_eval_offline.CocoEvaluatorOfflineWithPredFileEvaluators
              gt_path: ${paths.val_ann_file}  # ground-truth COCO JSON for AP computation
              tide: False
              iou_type: "segm"          # COCO eval in segmentation mode

  optim:
    amp:
      enabled: True
      amp_dtype: float16  # T4 is Turing (sm_75) — use float16 which has native Tensor Core support; bfloat16 requires Ampere (sm_80+) and conflicts with the always-enabled GradScaler

    optimizer:
      _target_: torch.optim.AdamW

    gradient_clip:
      _target_: sam3.train.optim.optimizer.GradientClipper
      max_norm: 0.1   # clip gradient norm (SAM3 standard value)
      norm_type: 2

    param_group_modifiers: []  # L4: no layer decay — vision backbone is fully frozen

    options:
      lr:
        - scheduler:  # transformer layers, cross-attention, class/query heads only (backbones are frozen)
            _target_: sam3.train.optim.schedulers.InverseSquareRootParamScheduler
            base_lr: ${scratch.lr_transformer}     # D-12: 8e-5
            timescale: ${scratch.scheduler_timescale}
            warmup_steps: ${scratch.scheduler_warmup}
            cooldown_steps: ${scratch.scheduler_cooldown}
        # backbone param groups removed — backbones are fully frozen (requires_grad=False)
        # so they generate no optimizer state and no gradient computation

      weight_decay:
        - scheduler:
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: ${scratch.wd}  # AdamW weight decay = 0.1
        - scheduler:  # bias and LayerNorm params: no weight decay (standard practice)
            _target_: fvcore.common.param_scheduler.ConstantParamScheduler
            value: 0.0
          param_names:
            - '*bias*'
          module_cls_names: ['torch.nn.LayerNorm']

  checkpoint:
    save_dir: ${launcher.experiment_log_dir}/checkpoints
    save_freq: 0                 # 0 = save only most-recent + best-meter checkpoints
    save_best_meters:
      - "val_custom/detection"   # saves checkpoint when any metric under this meter improves

  logging:
    tensorboard_writer:
      _target_: sam3.train.utils.logger.make_tensorboard_logger
      log_dir: ${launcher.experiment_log_dir}/tensorboard
      flush_secs: 120
      should_log: True
    wandb_writer: null           # wandb disabled by default; add credentials to enable
    log_dir: ${launcher.experiment_log_dir}/logs
    log_freq: 10                 # log training metrics every N steps

# ============================================================================
# Launcher and Submitit
# ============================================================================
launcher:
  num_nodes: 1           # single machine (change for multi-node cluster)
  gpus_per_node: 1       # GPUs per machine (change to 2+ for multi-GPU DDP)
  experiment_log_dir: ${paths.experiment_log_dir}
  multiprocessing_context: forkserver

submitit:
  account: null
  partition: null
  qos: null
  timeout_hour: 72
  use_cluster: False     # False = local training; True = SLURM cluster via submitit
  cpus_per_task: 4
  port_range: [10000, 65000]
  constraint: null
